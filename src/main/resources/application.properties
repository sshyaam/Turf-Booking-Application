spring.application.name=turf-booking

# H2 database
spring.datasource.url=jdbc:h2:mem:turfdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger / OpenAPI basic info
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Simple JWT secret and expiration (in ms)
app.jwt.secret=MAIN-TURF-SECRET-KEY-FOR-JWT-SECRET
app.jwt.expiration=3600000

# Basic CORS for local Angular dev (default Angular port 4200)
app.cors.allowed-origins=http://localhost:4200
